name: Build Protobuf XCFramework

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Protobuf version (e.g. 3.13.0 — without the leading v)"
        required: true
        type: string

# Needed to create a release and push the Package.swift update.
permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout spm-protobuf
        uses: actions/checkout@v4

      - name: Download protobuf objectivec release
        run: |
          VERSION="${{ github.event.inputs.version }}"
          curl -L \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${VERSION}/protobuf-objectivec-${VERSION}.zip" \
            -o protobuf-objc.zip
          unzip -q protobuf-objc.zip
          echo "OBJC_DIR=$PWD/protobuf-${VERSION}/objectivec" >> "$GITHUB_ENV"

      - name: Collect public headers
        run: |
          HEADERS="$RUNNER_TEMP/protobuf-headers"
          mkdir -p "$HEADERS/google/protobuf"

          find "$OBJC_DIR" -maxdepth 1 -name "*.h" \
            ! -name "*_PackagePrivate.h" \
            -exec cp {} "$HEADERS/" \;

          # Well-known type headers live in objectivec/google/protobuf/
          find "$OBJC_DIR/google/protobuf" -maxdepth 1 -name "*.h" \
            -exec cp {} "$HEADERS/google/protobuf/" \;

          echo "HEADERS=$HEADERS" >> "$GITHUB_ENV"

      - name: Build — iOS device
        run: |
          xcodebuild build \
            -project "$OBJC_DIR/ProtocolBuffers_iOS.xcodeproj" \
            -target ProtocolBuffers \
            -configuration Release \
            -sdk iphoneos \
            ONLY_ACTIVE_ARCH=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            CONFIGURATION_BUILD_DIR="$RUNNER_TEMP/build/ios-device"

      - name: Build — iOS Simulator
        run: |
          xcodebuild build \
            -project "$OBJC_DIR/ProtocolBuffers_iOS.xcodeproj" \
            -target ProtocolBuffers \
            -configuration Release \
            -sdk iphonesimulator \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64 x86_64" \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            CONFIGURATION_BUILD_DIR="$RUNNER_TEMP/build/ios-simulator"

      - name: Build — tvOS device
        run: |
          xcodebuild build \
            -project "$OBJC_DIR/ProtocolBuffers_tvOS.xcodeproj" \
            -target ProtocolBuffers \
            -configuration Release \
            -sdk appletvos \
            ONLY_ACTIVE_ARCH=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            CONFIGURATION_BUILD_DIR="$RUNNER_TEMP/build/tvos-device"

      - name: Build — tvOS Simulator
        run: |
          xcodebuild build \
            -project "$OBJC_DIR/ProtocolBuffers_tvOS.xcodeproj" \
            -target ProtocolBuffers \
            -configuration Release \
            -sdk appletvsimulator \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64 x86_64" \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            CONFIGURATION_BUILD_DIR="$RUNNER_TEMP/build/tvos-simulator"

      - name: Build — macOS
        run: |
          xcodebuild build \
            -project "$OBJC_DIR/ProtocolBuffers_OSX.xcodeproj" \
            -target ProtocolBuffers \
            -configuration Release \
            -sdk macosx \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64 x86_64" \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            CONFIGURATION_BUILD_DIR="$RUNNER_TEMP/build/macos"

      - name: Wrap static libraries into framework bundles
        run: |
          B="$RUNNER_TEMP/build"
          VERSION="${{ github.event.inputs.version }}"

          for SLICE in ios-device ios-simulator tvos-device tvos-simulator macos; do
            FW="$B/$SLICE/Protobuf.framework"
            mkdir -p "$FW/Headers/google/protobuf"

            # Static lib becomes the framework binary (renamed, no .a extension)
            cp "$B/$SLICE/libProtocolBuffers.a" "$FW/Protobuf"

            # Copy public headers into the framework bundle
            cp "$HEADERS/"*.h                 "$FW/Headers/"
            cp "$HEADERS/google/protobuf/"*.h "$FW/Headers/google/protobuf/"

            # Minimal Info.plist required by Xcode for a framework bundle.
            # PlistBuddy creates the file if it does not already exist.
            /usr/libexec/PlistBuddy \
              -c "Add :CFBundleExecutable         string Protobuf" \
              -c "Add :CFBundleIdentifier         string com.google.protobuf" \
              -c "Add :CFBundleName               string Protobuf" \
              -c "Add :CFBundlePackageType        string FMWK" \
              -c "Add :CFBundleShortVersionString string ${VERSION}" \
              -c "Add :CFBundleVersion            string ${VERSION}" \
              "$FW/Info.plist"
          done

      - name: Create XCFramework
        run: |
          B="$RUNNER_TEMP/build"

          # Use -framework (not -library) so each XCFramework slice contains
          # Protobuf.framework/Protobuf — the structure Xcode expects for a
          # SwiftPM .binaryTarget.
          xcodebuild -create-xcframework \
            -framework "$B/ios-device/Protobuf.framework"     \
            -framework "$B/ios-simulator/Protobuf.framework"  \
            -framework "$B/tvos-device/Protobuf.framework"    \
            -framework "$B/tvos-simulator/Protobuf.framework" \
            -framework "$B/macos/Protobuf.framework"          \
            -output "$RUNNER_TEMP/Protobuf.xcframework"

      - name: Zip and compute checksum
        run: |
          cd "$RUNNER_TEMP"
          zip -r Protobuf.xcframework.zip Protobuf.xcframework
          CHECKSUM=$(swift package compute-checksum "$RUNNER_TEMP/Protobuf.xcframework.zip")
          echo "CHECKSUM=$CHECKSUM" >> "$GITHUB_ENV"

      - name: Update Package.swift
        run: |
          VERSION="${{ github.event.inputs.version }}"
          sed -i '' \
            "s/static let version: String = \".*\"/static let version: String = \"${VERSION}\"/" \
            Package.swift
          sed -i '' \
            "s/static let checksum: String = \".*\"/static let checksum: String = \"${CHECKSUM}\"/" \
            Package.swift

      - name: Commit and push Package.swift
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          git commit -m "Update Protobuf binary target to ${{ github.event.inputs.version }}"
          git push

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          gh release create "${VERSION}" \
            --title "Protobuf ${VERSION}" \
            --notes "Protobuf XCFramework built from [protocolbuffers/protobuf v${VERSION}](https://github.com/protocolbuffers/protobuf/releases/tag/v${VERSION})." \
            "$RUNNER_TEMP/Protobuf.xcframework.zip"
