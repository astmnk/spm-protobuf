name: Build Protobuf XCFramework

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Protobuf version (e.g. 3.13.0 — without the leading v)"
        required: true
        type: string

# Needed to create a release and push the Package.swift update.
permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout spm-protobuf
        uses: actions/checkout@v4

      # Download the official objectivec release zip from GitHub releases.
      # It extracts to protobuf-<version>/ which contains the objectivec/ subdirectory
      # with the three platform-specific Xcode projects.
      - name: Download protobuf objectivec release
        run: |
          VERSION="${{ github.event.inputs.version }}"
          curl -L \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${VERSION}/protobuf-objectivec-${VERSION}.zip" \
            -o protobuf-objc.zip
          unzip -q protobuf-objc.zip
          echo "OBJC_DIR=$PWD/protobuf-${VERSION}/objectivec" >> "$GITHUB_ENV"

      # Gather public headers into a dedicated directory.
      # Excludes *_PackagePrivate.h files which are internal implementation details.
      - name: Collect public headers
        run: |
          HEADERS="$RUNNER_TEMP/protobuf-headers"
          mkdir -p "$HEADERS/google/protobuf"

          find "$OBJC_DIR" -maxdepth 1 -name "*.h" \
            ! -name "*_PackagePrivate.h" \
            -exec cp {} "$HEADERS/" \;

          # Well-known type headers live in objectivec/google/protobuf/
          find "$OBJC_DIR/google/protobuf" -maxdepth 1 -name "*.h" \
            -exec cp {} "$HEADERS/google/protobuf/" \;

          echo "HEADERS=$HEADERS" >> "$GITHUB_ENV"

      # Each platform uses its own Xcode project.
      # ONLY_ACTIVE_ARCH=NO ensures all supported architectures are compiled
      # CONFIGURATION_BUILD_DIR pins the output so we can reliably find libProtocolBuffers.a.

      - name: Build — iOS device
        run: |
          xcodebuild build \
            -project "$OBJC_DIR/ProtocolBuffers_iOS.xcodeproj" \
            -target ProtocolBuffers \
            -configuration Release \
            -sdk iphoneos \
            ONLY_ACTIVE_ARCH=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            CONFIGURATION_BUILD_DIR="$RUNNER_TEMP/build/ios-device"

      - name: Build — iOS Simulator
        run: |
          xcodebuild build \
            -project "$OBJC_DIR/ProtocolBuffers_iOS.xcodeproj" \
            -target ProtocolBuffers \
            -configuration Release \
            -sdk iphonesimulator \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64 x86_64" \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            CONFIGURATION_BUILD_DIR="$RUNNER_TEMP/build/ios-simulator"

      - name: Build — tvOS device
        run: |
          xcodebuild build \
            -project "$OBJC_DIR/ProtocolBuffers_tvOS.xcodeproj" \
            -target ProtocolBuffers \
            -configuration Release \
            -sdk appletvos \
            ONLY_ACTIVE_ARCH=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            CONFIGURATION_BUILD_DIR="$RUNNER_TEMP/build/tvos-device"

      - name: Build — tvOS Simulator
        run: |
          xcodebuild build \
            -project "$OBJC_DIR/ProtocolBuffers_tvOS.xcodeproj" \
            -target ProtocolBuffers \
            -configuration Release \
            -sdk appletvsimulator \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64 x86_64" \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            CONFIGURATION_BUILD_DIR="$RUNNER_TEMP/build/tvos-simulator"

      - name: Build — macOS
        run: |
          xcodebuild build \
            -project "$OBJC_DIR/ProtocolBuffers_OSX.xcodeproj" \
            -target ProtocolBuffers \
            -configuration Release \
            -sdk macosx \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64 x86_64" \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            CONFIGURATION_BUILD_DIR="$RUNNER_TEMP/build/macos"

      - name: Create XCFramework
        run: |
          B="$RUNNER_TEMP/build"
          LIB="libProtocolBuffers.a"

          xcodebuild -create-xcframework \
            -library "$B/ios-device/$LIB"     -headers "$HEADERS" \
            -library "$B/ios-simulator/$LIB"  -headers "$HEADERS" \
            -library "$B/tvos-device/$LIB"    -headers "$HEADERS" \
            -library "$B/tvos-simulator/$LIB" -headers "$HEADERS" \
            -library "$B/macos/$LIB"          -headers "$HEADERS" \
            -output "$RUNNER_TEMP/Protobuf.xcframework"

      # Zip the xcframework — SPM requires a zip for remote binary targets.
      # Then compute the SHA-256 checksum using the official SPM tool so the
      # value is guaranteed to match what `swift package resolve` expects.
      - name: Zip and compute checksum
        run: |
          cd "$RUNNER_TEMP"
          zip -r Protobuf.xcframework.zip Protobuf.xcframework
          CHECKSUM=$(swift package compute-checksum Protobuf.xcframework.zip)
          echo "CHECKSUM=$CHECKSUM" >> "$GITHUB_ENV"

      # Create the GitHub release and attach the zip as a release asset.
      # The tag is created here; if it already exists the step will fail fast.
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          gh release create "v${VERSION}" \
            --title "Protobuf v${VERSION}" \
            --notes "Protobuf XCFramework built from [protocolbuffers/protobuf v${VERSION}](https://github.com/protocolbuffers/protobuf/releases/tag/v${VERSION})." \
            "$RUNNER_TEMP/Protobuf.xcframework.zip"

      # Update only the two PackageMetadata values in Package.swift.
      # Everything else (URL template, target definition) stays unchanged.
      - name: Update Package.swift
        run: |
          VERSION="${{ github.event.inputs.version }}"
          sed -i '' \
            "s/static let version: String = \".*\"/static let version: String = \"${VERSION}\"/" \
            Package.swift
          sed -i '' \
            "s/static let checksum: String = \".*\"/static let checksum: String = \"${CHECKSUM}\"/" \
            Package.swift

      - name: Commit and push Package.swift
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          git commit -m "Update Protobuf binary target to v${{ github.event.inputs.version }}"
          git push
